name: score

services:
  mongo:
    image: mongo:7
    container_name: score-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: score-server
    restart: unless-stopped
    environment:
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:${CLIENT_PORT:-8081}
      MONGODB_URI: mongodb://mongo:27017/credit-risk-scoring
    ports:
      - "${SERVER_PORT:-5000}:5000"
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    container_name: score-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8081}:80"
    depends_on:
      - server

volumes:
  mongo-data: